; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Base environment with common settings
[env]
platform = ststm32
board = disco_f411ve
framework = stm32cube
monitor_speed = 115200
board_build.stm32cube.custom_dsp_library = yes
; monitor_filters = 
;   time        ; Add timestamp to each line

board_build.f_cpu = 100000000L
build_flags = 
    -std=gnu++17
    ; -DCMSIS_NN
    -O2  ; or -Os for size optimization
    ; -mfpu=fpv4-sp-d16     ; Enable FPU
    ; -mfloat-abi=hard      ; Use hardware floating point
    -Ilib/tflm_tree
    -Ilib/tflm_tree/tensorflow
    -Ilib/tflm_tree/tensorflow/lite
    -Ilib/tflm_tree/tensorflow/lite/micro
    
    ; The tensorflowlite-micro third party library paths
    -Ilib/tflm_tree/third_party/flatbuffers/include
    -Ilib/tflm_tree/third_party/gemmlowp
    -Ilib/tflm_tree/third_party/kissfft
    -Ilib/tflm_tree/third_party/ruy
    -DTF_LITE_STATIC_MEMORY
    -DDISCO_F411VE
    -std=c++17
    -Wl,-u,_printf_float

; KWS Large model environment 
[env:kws_large]
extends = env
build_flags = 
    ${env.build_flags}
    -Isrc/kws_large
build_src_filter = 
    +<*>
    -<kws_small/>
    -<person_detection/>
    -<vww/>


[env:kws_small]
extends = env
build_flags = 
    ${env.build_flags}
    -Isrc/kws_small
build_src_filter = 
    +<*>
    -<kws_large/>
    -<person_detection/>
    -<vww/>

[env:person_detection]
extends = env
build_flags = 
    ${env.build_flags}
    -Isrc/person_detection
build_src_filter = 
    +<*>
    -<kws_large/>
    -<kws_small/>
    -<vww/>


[env:vww]
extends = env
build_flags = 
    ${env.build_flags}
    -Isrc/vww
build_src_filter = 
    +<*>
    -<kws_large/>
    -<kws_small/>
    -<person_detection>
